<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Trip Expense Split</title>
<script>window.onerror=(m,s,l)=>{const e=document.getElementById('status');if(e)e.textContent='JS error: '+m+' line '+l}</script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script><script src="firebase-config.js"></script>
<style>:root{--b:#f6f7fb;--c:#fff;--t:#172033;--m:#6b7280;--l:#e5e7eb;--p:#2563eb;--s:#dbeafe;--d:#dc2626;--g:#059669}*{box-sizing:border-box}body{margin:0;background:var(--b);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;color:var(--t)}.app{max-width:880px;margin:auto;padding:14px 14px 92px}header{position:sticky;top:0;background:rgba(246,247,251,.94);backdrop-filter:blur(12px);z-index:5;padding:8px 0 12px}.top{display:flex;justify-content:space-between;align-items:center;gap:12px}h1{font-size:22px;margin:4px 0 2px}h2{font-size:18px;margin:0 0 10px}.status,.hint,.meta{font-size:12px;color:var(--m);line-height:1.45}.card,.expense,.settle,.box{background:#fff;border:1px solid var(--l);border-radius:18px;padding:14px;margin:12px 0;box-shadow:0 8px 18px rgba(15,23,42,.06)}input,select,button{font:inherit}input,select{width:100%;border:1px solid var(--l);border-radius:14px;padding:13px 12px;background:#fff;font-size:16px}button{border:0;border-radius:14px;padding:12px 14px;font-weight:800;background:var(--p);color:#fff;min-height:44px}.ghost{background:#fff;color:var(--t);border:1px solid var(--l)}.danger{background:#fee2e2;color:var(--d)}.small{min-height:34px;padding:7px 10px;font-size:13px}.pill{border-radius:999px;background:var(--s);color:var(--p);font-size:12px;padding:8px 11px}label{display:block;color:var(--m);font-size:12px;font-weight:800;margin:8px 0 5px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:9px}.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:9px}.metric{background:#f8fafc;border:1px solid var(--l);border-radius:16px;padding:12px}.metric .label{color:var(--m);font-size:12px;font-weight:800}.metric .value{font-size:20px;font-weight:950;margin-top:4px}.view{display:none}.view.active{display:block}.tabs{position:fixed;left:0;right:0;bottom:0;background:rgba(255,255,255,.94);border-top:1px solid var(--l);display:grid;grid-template-columns:repeat(5,1fr);padding:8px 8px calc(8px + env(safe-area-inset-bottom));backdrop-filter:blur(12px)}.tab{background:transparent;color:var(--m);font-size:11px;display:flex;flex-direction:column;gap:3px;align-items:center;padding:7px 2px;border-radius:14px}.tab.active{background:var(--s);color:var(--p)}.tab span:first-child{font-size:19px}.chips{display:flex;flex-wrap:wrap;gap:7px;margin-top:8px}.chip{border:1px solid var(--l);background:#fff;color:var(--t);border-radius:999px;padding:9px 11px;font-size:14px}.chip.active{background:var(--p);color:#fff;border-color:var(--p)}.expense-main{display:flex;justify-content:space-between;gap:12px}.title,.amount{font-weight:950}.amount{white-space:nowrap}.row{display:flex;justify-content:space-between;border-bottom:1px solid var(--l);padding:11px 0}.row:last-child{border-bottom:0}.positive{color:var(--g);font-weight:950}.negative{color:var(--d);font-weight:950}.empty{text-align:center;color:var(--m);padding:24px 10px}.toast{position:fixed;left:14px;right:14px;bottom:86px;background:#111827;color:#fff;border-radius:16px;padding:13px 14px;z-index:99;display:none}.toast.show{display:block}.modalWrap{position:fixed;inset:0;background:rgba(15,23,42,.42);display:none;align-items:flex-end;z-index:50}.modalWrap.show{display:flex}.modal{background:#fff;width:100%;max-width:880px;margin:0 auto;border-radius:22px 22px 0 0;padding:18px 14px calc(18px + env(safe-area-inset-bottom));max-height:90vh;overflow:auto}@media(min-width:760px){.tabs{max-width:880px;margin:auto;border-left:1px solid var(--l);border-right:1px solid var(--l);border-radius:22px 22px 0 0}.modalWrap{align-items:center}.modal{border-radius:22px;padding:22px}}</style></head><body>
<div class="app"><header><div class="top"><div><h1 id="tripTitle">Trip Expense</h1><div id="status" class="status">Starting…</div></div><button id="shareBtn" class="pill">Share</button></div></header>
<section id="dashboard" class="view active"><div class="card"><h2>Dashboard</h2><div class="grid3"><div class="metric"><div class="label">Total spent</div><div id="metricTotal" class="value">0.00</div></div><div class="metric"><div class="label">Expenses</div><div id="metricCount" class="value">0</div></div><div class="metric"><div class="label">Base</div><div id="metricCurrency" class="value">HKD</div></div></div></div><div class="card"><h2>Quick Add</h2><div id="quickDash"></div></div><div class="card"><h2>Recent Expenses</h2><div id="recentList"></div></div><div class="card"><h2>Balances</h2><div id="dashboardBalances"></div></div></section>
<section id="expenses" class="view"><div class="card"><h2>Expenses</h2><input id="search" placeholder="Search expense / payer / currency"><div id="expenseList"></div></div></section><section id="settle" class="view"><div class="card"><h2>Settle Up</h2><div id="settleList"></div></div><div class="card"><h2>Balances by Person</h2><div id="summaryList"></div></div></section><section id="quick" class="view"><div class="card"><h2>Quick Add</h2><div id="quickPage"></div></div></section>
<section id="setup" class="view"><div class="card"><h2>Trip</h2><label>Trip name</label><input id="tripNameInput"><div class="grid"><div><label>Base currency</label><select id="baseCurrency"></select></div><div><label>Default expense currency</label><select id="defaultCurrency"></select></div></div><button id="saveTrip" style="width:100%;margin-top:10px">Save Trip Settings</button></div><div class="card"><h2>FX Rates</h2><div id="fxInputs"></div><div class="hint">Rate means: 1 unit of that currency equals how many units of your base currency.</div></div><div class="card"><h2>People</h2><div class="grid"><input id="personInput" placeholder="Add person"><button id="addPerson">Add</button></div><div id="peopleList" class="chips"></div></div><div class="card"><h2>Data</h2><div class="grid"><button id="exportBtn">Export JSON</button><button id="copyLink" class="ghost">Copy Link</button></div></div></section></div>
<nav class="tabs"><button class="tab active" data-view="dashboard"><span>🏠</span><span>Dashboard</span></button><button class="tab" data-view="expenses"><span>🧾</span><span>Expenses</span></button><button class="tab" data-view="settle"><span>⚖️</span><span>Settle</span></button><button class="tab" data-view="quick"><span>＋</span><span>Quick</span></button><button class="tab" data-view="setup"><span>⚙️</span><span>Setup</span></button></nav><div id="editWrap" class="modalWrap"><div class="modal"><div class="top"><h2>Edit expense</h2><button id="closeEdit" class="small ghost">Close</button></div><div id="editForm"></div></div></div><div id="toast" class="toast"></div>
<script>
const CURRENCIES=['HKD','THB','USD','TWD','JPY','CNY','SGD','EUR','GBP','AUD','KRW','MYR'];let tripId=new URLSearchParams(location.search).get('trip'),tripRef=null,db=null;let state={tripName:'Trip Expense',people:['Jess','Amy','Matt'],baseCurrency:'HKD',defaultCurrency:'THB',fxRates:{HKD:1,THB:.22,USD:7.8,TWD:.24,JPY:.052,CNY:1.08,SGD:5.8,EUR:8.5,GBP:9.9,AUD:5.1,KRW:.0057,MYR:1.65},expenses:[]};const $=id=>document.getElementById(id);function uuid(){return crypto.randomUUID?crypto.randomUUID():'id'+Date.now()+Math.random().toString(36).slice(2)}if(!tripId){tripId=uuid();const u=new URL(location.href);u.searchParams.set('trip',tripId);history.replaceState(null,'',u)}function today(){return new Date().toISOString().slice(0,10)}function expenseDate(e){return e.date||(e.createdAt?new Date(e.createdAt).toISOString().slice(0,10):today())}function status(t){$('status').textContent=t}function toast(t){$('toast').textContent=t;$('toast').classList.add('show');setTimeout(()=>$('toast').classList.remove('show'),2300)}function esc(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}function money(n){return Number(n||0).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2})}function rate(c){return c===state.baseCurrency?1:Number(state.fxRates[c]||1)}function baseAmt(e){return Number(e.baseAmount??(Number(e.amount||0)*Number(e.fxRate||1)))}function currencies(){return[...new Set([state.baseCurrency,state.defaultCurrency,...CURRENCIES])]}function fillSelect(id,val){const s=$(id);if(!s)return;s.innerHTML=currencies().map(c=>`<option ${c===val?'selected':''}>${c}</option>`).join('')}function peopleChips(mode,e={}){return state.people.map((p,i)=>`<button type="button" class="chip ${(mode==='payer'?(p===(e.payer||state.people[0])):((e.splitWith||state.people).includes(p)))?'active':''}" data-person="${esc(p)}">${esc(p)}</button>`).join('')}function formHtml(prefix,e={}){return `<label>Date</label><input id="${prefix}Date" type="date" value="${esc(expenseDate(e))}"><label>Description</label><input id="${prefix}Desc" placeholder="Dinner / taxi / hotel" value="${esc(e.description||'')}"><div class="grid"><div><label>Currency</label><select id="${prefix}Currency"></select></div><div><label>Amount</label><input id="${prefix}Amount" type="number" inputmode="decimal" placeholder="120" value="${esc(e.amount||'')}"></div></div><label>FX to base</label><input id="${prefix}Fx" type="number" inputmode="decimal" step="0.000001" value="${esc(e.fxRate||'')}"><div id="${prefix}Converted" class="hint">Converted amount: 0.00 ${esc(state.baseCurrency)}</div><div class="box"><div class="hint"><b>Paid by — choose one</b></div><div id="${prefix}Payer" class="chips">${peopleChips('payer',e)}</div></div><div class="box"><div class="top"><div class="hint"><b>Split with — choose one or more</b></div><button type="button" class="small ghost" id="${prefix}All">All</button></div><div id="${prefix}Split" class="chips">${peopleChips('split',e)}</div></div><button id="${prefix}Save" style="width:100%;margin-top:10px">${e.id?'Save Changes':'Add Expense'}</button>`}function setupForm(prefix,containerId,e={}){const box=$(containerId);if(!box)return;box.innerHTML=formHtml(prefix,e);fillSelect(prefix+'Currency',e.currency||state.defaultCurrency);if(!$(prefix+'Fx').value)$(prefix+'Fx').value=rate($(prefix+'Currency').value);const upd=()=>{$(prefix+'Converted').textContent=`Converted amount: ${money((Number($(prefix+'Amount').value)||0)*(Number($(prefix+'Fx').value)||rate($(prefix+'Currency').value)))} ${state.baseCurrency}`};$(prefix+'Currency').onchange=()=>{$(prefix+'Fx').value=rate($(prefix+'Currency').value);upd()};$(prefix+'Amount').oninput=upd;$(prefix+'Fx').oninput=upd;[...$(prefix+'Payer').querySelectorAll('.chip')].forEach(ch=>ch.onclick=()=>{[...$(prefix+'Payer').querySelectorAll('.chip')].forEach(c=>c.classList.remove('active'));ch.classList.add('active')});[...$(prefix+'Split').querySelectorAll('.chip')].forEach(ch=>ch.onclick=()=>ch.classList.toggle('active'));$(prefix+'All').onclick=()=>[...$(prefix+'Split').querySelectorAll('.chip')].forEach(c=>c.classList.add('active'));$(prefix+'Save').onclick=()=>saveExpense(prefix,e.id);upd()}function collect(prefix,id){const description=$(prefix+'Desc').value.trim(),amount=Number($(prefix+'Amount').value),currency=$(prefix+'Currency').value,fxRate=Number($(prefix+'Fx').value)||1,date=$(prefix+'Date').value||today(),payer=$(prefix+'Payer').querySelector('.chip.active')?.dataset.person,splitWith=[...$(prefix+'Split').querySelectorAll('.chip.active')].map(c=>c.dataset.person);if(!description)throw Error('Enter a description');if(!amount||amount<=0)throw Error('Enter amount');if(!payer)throw Error('Choose who paid');if(!splitWith.length)throw Error('Choose split people');return{id:id||uuid(),date,description,amount,currency,fxRate,baseAmount:amount*fxRate,payer,splitWith,updatedAt:Date.now()}}async function saveExpense(prefix,id){try{const exp=collect(prefix,id);state.fxRates[exp.currency]=exp.fxRate;await saveMeta();if(id){if(tripRef)await tripRef.collection('expenses').doc(id).set(exp,{merge:true});else state.expenses=state.expenses.map(e=>e.id===id?{...e,...exp}:e);$('editWrap').classList.remove('show');toast('Expense updated')}else{exp.createdAt=Date.now();if(tripRef)await tripRef.collection('expenses').doc(exp.id).set(exp);else state.expenses.unshift(exp);$(prefix+'Desc').value='';$(prefix+'Amount').value='';$(prefix+'Date').value=today();toast('Expense added')}if(!tripRef){localStorage.setItem('trip-'+tripId,JSON.stringify(state));render()}}catch(e){toast(e.message)}}async function saveMeta(){const data={tripName:state.tripName,people:state.people,baseCurrency:state.baseCurrency,defaultCurrency:state.defaultCurrency,fxRates:state.fxRates,updatedAt:firebase.firestore.FieldValue.serverTimestamp()};if(tripRef)await tripRef.set(data,{merge:true});else localStorage.setItem('trip-'+tripId,JSON.stringify(state))}window.deleteExpense=async id=>{if(!confirm('Delete this expense?'))return;if(tripRef)await tripRef.collection('expenses').doc(id).delete();else{state.expenses=state.expenses.filter(e=>e.id!==id);localStorage.setItem('trip-'+tripId,JSON.stringify(state));render()}};window.editExpense=id=>{const e=state.expenses.find(x=>x.id===id);if(!e)return;setupForm('edit','editForm',e);$('editWrap').classList.add('show')};function balances(){const b={};state.people.forEach(p=>b[p]=0);state.expenses.forEach(e=>{const a=baseAmt(e),split=e.splitWith?.length?e.splitWith:state.people,share=a/split.length;b[e.payer]=(b[e.payer]||0)+a;split.forEach(p=>b[p]=(b[p]||0)-share)});return b}function settlements(b){const d=[],c=[];Object.entries(b).forEach(([p,a])=>{a=Math.round(a*100)/100;if(a<-.01)d.push({p,a:-a});if(a>.01)c.push({p,a})});d.sort((x,y)=>y.a-x.a);c.sort((x,y)=>y.a-x.a);const out=[];let i=0,j=0;while(i<d.length&&j<c.length){let pay=Math.min(d[i].a,c[j].a);out.push({from:d[i].p,to:c[j].p,amount:Math.round(pay*100)/100});d[i].a-=pay;c[j].a-=pay;if(d[i].a<.01)i++;if(c[j].a<.01)j++}return out}function expenseCard(e){const base=baseAmt(e);return `<div class="expense"><div class="expense-main"><div><div class="title">${esc(e.description)}</div><div class="meta">${esc(expenseDate(e))} · Paid by <b>${esc(e.payer)}</b><br>${esc(e.currency)} ${money(e.amount)} × FX ${money(e.fxRate)} = <b>${money(base)} ${esc(state.baseCurrency)}</b><br>Split: ${esc((e.splitWith||[]).join(', '))}</div></div><div style="text-align:right"><div class="amount">${money(base)} ${esc(state.baseCurrency)}</div><button class="small ghost" onclick="editExpense('${e.id}')">Edit</button> <button class="small danger" onclick="deleteExpense('${e.id}')">Delete</button></div></div></div>`}function render(){ $('tripTitle').textContent=state.tripName;$('tripNameInput').value=state.tripName;$('metricCurrency').textContent=state.baseCurrency;fillSelect('baseCurrency',state.baseCurrency);fillSelect('defaultCurrency',state.defaultCurrency);$('metricTotal').textContent=money(state.expenses.reduce((s,e)=>s+baseAmt(e),0));$('metricCount').textContent=state.expenses.length;setupForm('dash','quickDash');setupForm('quick','quickPage');$('peopleList').innerHTML=state.people.map(p=>`<button class="chip" data-remove="${esc(p)}">${esc(p)} ×</button>`).join('');[...$('peopleList').querySelectorAll('[data-remove]')].forEach(b=>b.onclick=async()=>{if(state.people.length<=1)return toast('Keep at least one person');state.people=state.people.filter(p=>p!==b.dataset.remove);await saveMeta();render()});$('fxInputs').innerHTML=currencies().map(c=>`<div class="grid"><div><label>${esc(c)} to ${esc(state.baseCurrency)}</label><input data-fx="${esc(c)}" type="number" step="0.000001" value="${c===state.baseCurrency?1:rate(c)}" ${c===state.baseCurrency?'disabled':''}></div><div style="display:flex;align-items:end"><button class="small ghost" data-base="${esc(c)}" style="width:100%">Set as base</button></div></div>`).join('');[...$('fxInputs').querySelectorAll('[data-fx]')].forEach(i=>i.onchange=async()=>{state.fxRates[i.dataset.fx]=Number(i.value)||1;await saveMeta();render()});[...$('fxInputs').querySelectorAll('[data-base]')].forEach(b=>b.onclick=async()=>{state.baseCurrency=b.dataset.base;state.fxRates[state.baseCurrency]=1;await saveMeta();render()});const sorted=[...state.expenses].sort((a,b)=>expenseDate(b).localeCompare(expenseDate(a))||(b.createdAt||0)-(a.createdAt||0)),q=($('search').value||'').toLowerCase(),filtered=sorted.filter(e=>!q||[e.date,e.description,e.payer,e.currency,(e.splitWith||[]).join(',')].join(' ').toLowerCase().includes(q));$('recentList').innerHTML=sorted.slice(0,4).map(expenseCard).join('')||'<div class="empty">No expenses yet.</div>';$('expenseList').innerHTML=filtered.map(expenseCard).join('')||'<div class="empty">No matching expenses.</div>';const b=balances(),balHtml=Object.entries(b).sort((a,b)=>b[1]-a[1]).map(([p,a])=>`<div class="row"><strong>${esc(p)}</strong><span class="${a>=0?'positive':'negative'}">${a>=0?'+':''}${money(a)} ${esc(state.baseCurrency)}</span></div>`).join('');$('summaryList').innerHTML=balHtml||'<div class="empty">No data yet.</div>';$('dashboardBalances').innerHTML=balHtml||'<div class="empty">No balances yet.</div>';const st=settlements(b);$('settleList').innerHTML=st.map(s=>`<div class="settle"><div class="top"><div><b>${esc(s.from)} → ${esc(s.to)}</b><div class="meta">${esc(s.from)} should pay ${esc(s.to)}</div></div><div class="amount">${money(s.amount)} ${esc(state.baseCurrency)}</div></div></div>`).join('')||'<div class="empty">All settled.</div>'}document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));$(t.dataset.view).classList.add('active');t.classList.add('active')});$('search').oninput=render;$('closeEdit').onclick=()=>$('editWrap').classList.remove('show');$('addPerson').onclick=async()=>{const n=$('personInput').value.trim();if(!n)return;if(state.people.some(p=>p.toLowerCase()===n.toLowerCase()))return toast('Person exists');state.people.push(n);$('personInput').value='';await saveMeta();render()};$('saveTrip').onclick=async()=>{state.tripName=$('tripNameInput').value.trim()||'Trip Expense';state.baseCurrency=$('baseCurrency').value;state.defaultCurrency=$('defaultCurrency').value;state.fxRates[state.baseCurrency]=1;await saveMeta();render();toast('Saved')};$('shareBtn').onclick=$('copyLink').onclick=async()=>{try{await navigator.clipboard.writeText(location.href);toast('Copied link')}catch{prompt('Copy link',location.href)}};$('exportBtn').onclick=()=>{const blob=new Blob([JSON.stringify({tripId,...state},null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='trip-expense.json';a.click()};async function start(){render();try{status('Loading Firebase…');if(!window.firebaseConfig||!window.firebaseConfig.apiKey)throw Error('Missing firebase-config.js');firebase.initializeApp(window.firebaseConfig);db=firebase.firestore();status('Signing in…');await firebase.auth().signInAnonymously();status('Connected · shared editing on');tripRef=db.collection('trips').doc(tripId);tripRef.onSnapshot(async doc=>{try{if(!doc.exists){await tripRef.set({tripName:state.tripName,people:state.people,baseCurrency:state.baseCurrency,defaultCurrency:state.defaultCurrency,fxRates:state.fxRates,createdAt:firebase.firestore.FieldValue.serverTimestamp()},{merge:true});return}const d=doc.data();state={...state,tripName:d.tripName||state.tripName,people:d.people||state.people,baseCurrency:d.baseCurrency||state.baseCurrency,defaultCurrency:d.defaultCurrency||state.defaultCurrency,fxRates:{...state.fxRates,...(d.fxRates||{})}};render()}catch(e){status('Trip load error: '+e.message)}});tripRef.collection('expenses').onSnapshot(snap=>{state.expenses=snap.docs.map(d=>({id:d.id,...d.data()}));render()},e=>status('Expenses error: '+e.message))}catch(e){status('Local fallback: '+e.message);const saved=localStorage.getItem('trip-'+tripId);if(saved){try{state=JSON.parse(saved)}catch{}}render()}}start();
</script></body></html>
